<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/public/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>My Gallery | Beautiful Photo Collection</title>
    <meta name="title" content="My Gallery | Beautiful Photo Collection" />
    <meta
      name="description"
      content="Explore a beautiful collection of photos organized in albums. Search, view, and enjoy stunning photography in this modern gallery website."
    />
    <meta
      name="keywords"
      content="photo gallery, photography gallery, image collection, albums, react gallery website"
    />
    <meta name="author" content="Soham Chitrao" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#000000" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="My Gallery | Beautiful Photo Collection"
    />
    <meta
      property="og:description"
      content="Browse stunning photos organized into albums. Built with React and modern UI."
    />
    <meta property="og:image" content="/preview.png" />
    <meta property="og:url" content="https://yourwebsite.com" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="My Gallery | Beautiful Photo Collection"
    />
    <meta
      name="twitter:description"
      content="Browse stunning photos organized into albums."
    />
    <meta name="twitter:image" content="/preview.png" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />
  </head>

  <body>
    <div id="root"></div>
    <script>
      const savedTheme = localStorage.getItem("theme");

      if (
        savedTheme === "dark" ||
        (!savedTheme &&
          window.matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        document.documentElement.classList.add("dark");
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
